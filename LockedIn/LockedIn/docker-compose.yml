version: '3.8'

services:
  backend:
    build: .
    ports:
      - "${PORT:-8000}:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  # Optional: database or other services can be added here
